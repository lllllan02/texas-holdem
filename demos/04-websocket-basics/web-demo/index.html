<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Demo</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        #messages { border: 1px solid #ccc; height: 300px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; background: #f9f9f9; }
        .msg { margin-bottom: 5px; padding: 5px; border-bottom: 1px solid #eee; }
        .status { color: #888; font-style: italic; }
        .controls { display: flex; gap: 10px; }
        input[type="text"] { flex: 1; padding: 8px; }
        button { padding: 8px 15px; cursor: pointer; }
    </style>
</head>
<body>
    <h2>WebSocket 实时通信测试</h2>
    
    <div id="messages"></div>
    
    <div class="controls">
        <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off" disabled>
        <button id="sendBtn" disabled>发送</button>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let ws;

        function appendMessage(text, isStatus = false) {
            const div = document.createElement('div');
            div.className = isStatus ? 'msg status' : 'msg';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connect() {
            // 连接到 Go 后端
            ws = new WebSocket('ws://localhost:8080/ws');

            ws.onopen = function() {
                appendMessage('🟢 已连接到服务器 (Connected)', true);
                msgInput.disabled = false;
                sendBtn.disabled = false;
                msgInput.focus();
            };

            ws.onclose = function() {
                appendMessage('🔴 连接已断开 (Disconnected)', true);
                msgInput.disabled = true;
                sendBtn.disabled = true;
                // 尝试重连
                setTimeout(connect, 3000);
            };

            ws.onmessage = function(evt) {
                appendMessage('📩 收到广播: ' + evt.data);
            };

            ws.onerror = function(err) {
                appendMessage('❌ 发生错误: ' + err, true);
            };
        }

        function sendMessage() {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const text = msgInput.value.trim();
            if (text) {
                ws.send(text);
                msgInput.value = '';
                msgInput.focus();
            }
        }

        sendBtn.onclick = sendMessage;
        msgInput.onkeypress = function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        };

        // 启动连接
        connect();
    </script>
</body>
</html>
